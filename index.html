<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쏭니아의 홈페이지</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
      color: #222;
    }
    .container {
      max-width: 800px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 36px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
    }
    .tag {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 14px;
      background: #222;
      color: white;
      border-radius: 999px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>안녕하세요, 쏭니아입니다.</h1>
    <p>
      콘텐츠와 전략, 데이터를 연결해 사람의 마음을 움직이는 일을 합니다.
    </p>
    <p>
      이곳은 저의 작업과 생각을 기록하는 개인 홈페이지입니다.
    </p>
    <div class="tag">Content Strategist</div>
  </div>
</body>
</html>
